name: Deploy to K3s

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Make sure to strictly use lowercase to avoid docker parsing errors
          docker build -t ghcr.io/pranjali2117/final_agentic:latest .
          docker push ghcr.io/pranjali2117/final_agentic:latest

      - name: Copy K8s manifests to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "k8s/deployment.yaml"
          target: "~/"

      - name: Deploy to K3s Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo k3s kubectl apply -f ~/k8s/deployment.yaml
            sudo k3s kubectl rollout restart deployment/sportlytics-deployment
