apiVersion: apps/v1
kind: Deployment
metadata:
  name: sportlytics-deployment
  labels:
    app: sportlytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sportlytics
  template:
    metadata:
      labels:
        app: sportlytics
    spec:
      containers:
      - name: sportlytics
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/sportlytics:latest
        ports:
        - containerPort: 8501
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: sportlytics-secrets
              key: GROQ_API_KEY
        - name: TAVILY_API_KEY
          valueFrom:
            secretKeyRef:
              name: sportlytics-secrets
              key: TAVILY_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: sportlytics-service
spec:
  selector:
    app: sportlytics
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer
